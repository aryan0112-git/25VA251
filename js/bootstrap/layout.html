<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Layout 1</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <style>
        .box {
            border: 2px solid #000;
            text-align: center;
            font-weight: bold;
            padding: 20px;
        }

        .content-area {
            height: 250px;
        }

        .index-box {
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content-box {
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    
    <div class="row">
        <div class="col-12 box">
            Header Section
        </div>
    </div>
    <div class="row">
        <div class="col-12 box">
            Navigation Bar
        </div>
    </div>

    <div class="row content-area">

      
        <div class="col-md-12 bg-dangerh-58">
            <h2>Top Right</h2>
            Index
        </div>

       
        <div class="col-md-9 box content-box">
            <h2>Bottom Right</h2>
            Content Section
        </div>

    </div>

   
    <div class="row">
        <div class="col-12 box">
            Footer Section
        </div>
    </div>

</div>

</body>
</html>
